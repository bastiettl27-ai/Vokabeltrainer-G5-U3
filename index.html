<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Ettl Trainer Pro</title>
    <script src="audio_data.js"></script>
    <style>
        :root { 
            --bg: #f0f2f5; 
            --card: #ffffff; 
            --accent: #4a90e2; 
            --success: #47cf73;
            --error: #ff6b6b;
            --text: #333;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background 1.2s ease; overflow: hidden; }
        
        .card { background: var(--card); padding: 2.5rem; border-radius: 25px; text-align: center; width: 90%; max-width: 450px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); position: relative; z-index: 10; transition: transform 0.2s, background 0.3s; }
        
        .flash-success { background: #d4edda !important; transform: scale(1.02); border: 2px solid var(--success); }
        .flash-error { background: #f8d7da !important; transform: scale(0.98); border: 2px solid var(--error); }

        .stats { display: flex; justify-content: space-between; font-weight: bold; color: var(--accent); margin-bottom: 20px; font-size: 1.1rem; }

        .mode-select { display: flex; gap: 8px; margin-bottom: 25px; background: #eee; padding: 6px; border-radius: 14px; }
        .mode-btn { flex: 1; font-size: 0.7rem; padding: 10px; border: none; cursor: pointer; border-radius: 10px; background: transparent; font-weight: bold; color: #777; transition: 0.3s; }
        .mode-btn.active { background: white; color: var(--accent); box-shadow: 0 4px 8px rgba(0,0,0,0.08); }

        #display-word { font-size: 2.4rem; font-weight: bold; margin: 1.2rem 0; min-height: 4rem; display: flex; align-items: center; justify-content: center; line-height: 1.2; color: #212529; }
        #feedback { font-size: 1.1rem; height: 1.6rem; margin-bottom: 15px; font-weight: bold; }

        input { 
            width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 16px; 
            font-size: 1.3rem; outline: none; margin-bottom: 20px; text-align: center; 
            transition: border-color 0.3s; 
        }
        input:focus { border-color: var(--accent); }

        .controls { display: flex; gap: 12px; }
        .btn-next { flex: 4; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 16px; font-size: 1.3rem; font-weight: bold; cursor: pointer; }
        .btn-audio { flex: 1; background: #f0f0f0; border: none; border-radius: 16px; cursor: pointer; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; }

        .footer { margin-top: 30px; font-size: 0.85rem; color: #ccc; letter-spacing: 0.5px; }
        canvas#fw { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

<canvas id="fw"></canvas>

<div class="card" id="main-card">
    <div class="stats">
        <div>Score: <span id="count">0</span></div>
        <div>Offen: <span id="rem">0</span></div>
    </div>
    
    <div class="mode-select">
        <button id="m-en" class="mode-btn active" onclick="setMode('EN_DE')">EN > DE</button>
        <button id="m-de" class="mode-btn" onclick="setMode('DE_EN')">DE > EN</button>
        <button id="m-au" class="mode-btn" onclick="setMode('AUDIO')">HÖREN</button>
    </div>

    <div id="display-word">Lade...</div>
    <div id="feedback"></div>
    
    <input type="text" id="in" placeholder="Antwort..." autocomplete="off" autocapitalize="off" spellcheck="false" autocorrect="off">
    
    <div class="controls">
        <button class="btn-next" onclick="check()">PRÜFEN</button>
        <button class="btn-audio" onclick="play()">🔊</button>
    </div>

    <div class="footer">Created by Master Ettl</div>
</div>

<script>

{en:"the fastest", de:"der/die/das schnellste"},
{en:"race", de:"Rennen"}
    ];
    // ==========================================================

    let pool = [...raw];
    let cur = null;
    let mode = 'EN_DE';
    let score = 0;
    let audioCtx = null;
    const colors = ["#e3f2fd", "#f1f8e9", "#fff3e0", "#f3e5f5", "#e0f2f1", "#fffde7", "#fce4ec"];

    function wake() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.frequency.setValueAtTime(1, audioCtx.currentTime);
            g.gain.setValueAtTime(0.001, audioCtx.currentTime);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.1);
        } catch(e){}
    }

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-' + (m==='EN_DE'?'en':m==='DE_EN'?'de':'au')).classList.add('active');
        next();
    }

    function play() {
        if (!cur) return;
        const cleanKey = cur.en.toLowerCase().replace(/[?!.,']/g, "").trim();
        if (typeof MASTER_ETTL_AUDIO !== 'undefined') {
            const b64 = MASTER_ETTL_AUDIO[cleanKey] || MASTER_ETTL_AUDIO[cur.en.toLowerCase().trim()];
            if (b64) {
                wake();
                setTimeout(() => { new Audio("data:audio/mp3;base64," + b64).play(); }, 150);
            }
        }
    }

    function next() {
        if (pool.length === 0) {
            document.getElementById('display-word').innerText = "🎉 Fertig!";
            document.getElementById('in').style.display = "none";
            return;
        }
        const idx = Math.floor(Math.random() * pool.length);
        cur = pool[idx];

        document.getElementById('in').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('main-card').className = "card";
        document.getElementById('rem').innerText = pool.length;

        if (mode === 'EN_DE') document.getElementById('display-word').innerText = cur.en;
        else if (mode === 'DE_EN') document.getElementById('display-word').innerText = cur.de;
        else { document.getElementById('display-word').innerText = "🔊 ???"; play(); }
    }

    function check() {
        let inputField = document.getElementById('in');
        let val = inputField.value.toLowerCase().replace(/[?!.,']/g, "").trim();
        
        let targetEn = cur.en.toLowerCase().replace(/[?!.,']/g, "").trim();
        let targetDe = cur.de.toLowerCase().replace(/[?!.,']/g, "").trim();
        let target = (mode === 'DE_EN' || mode === 'AUDIO') ? targetEn : targetDe;
        let displayTarget = (mode === 'DE_EN' || mode === 'AUDIO') ? cur.en : cur.de;

        let isCorrect = (val === target);

        // AE / BE & "to" Logik
        if (!isCorrect && (mode === 'DE_EN' || mode === 'AUDIO')) {
            if ("to " + val === target || val === "to " + target) isCorrect = true;
            let altVal = val.replace(/or$/, "our").replace(/our$/, "or").replace(/re$/, "er").replace(/er$/, "re").replace(/ize$/, "ise").replace(/ise$/, "ize");
            if (altVal === target || "to " + altVal === target) isCorrect = true;
        }

        const card = document.getElementById('main-card');
        const feed = document.getElementById('feedback');

        if (isCorrect) {
            score++;
            const pIdx = pool.findIndex(i => i.en === cur.en);
            if (pIdx !== -1) pool.splice(pIdx, 1);

            card.classList.add('flash-success');
            feed.innerText = "Richtig!";
            feed.style.color = "var(--success)";
            
            if (score > 0 && score % 10 === 0) {
                document.body.style.background = colors[Math.floor(Math.random()*colors.length)];
                fire();
            }
            setTimeout(next, 700);
        } else {
            card.classList.add('flash-error');
            feed.innerText = "Lösung: " + displayTarget;
            feed.style.color = "var(--error)";
            if (mode === 'AUDIO') play();
            setTimeout(next, 2200);
        }
        document.getElementById('count').innerText = score;
    }

    function fire() {
        const c = document.getElementById('fw');
        const x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let p = [];
        for(let i=0; i<120; i++) {
            p.push({x:c.width/2, y:c.height/2, dx:(Math.random()-0.5)*14, dy:(Math.random()-0.5)*14, col:`hsl(${Math.random()*360},75%,60%)`, a:1});
        }
        function draw() {
            x.clearRect(0,0,c.width,c.height);
            p.forEach(i => {
                i.x+=i.dx; i.y+=i.dy; i.dy+=0.18; i.a-=0.015;
                x.globalAlpha=i.a; x.fillStyle=i.col;
                x.beginPath(); x.arc(i.x,i.y,4,0,7); x.fill();
            });
            p = p.filter(i=>i.a>0);
            if(p.length>0) requestAnimationFrame(draw);
        }
        draw();
    }

    document.getElementById('in').addEventListener('keypress', (e) => { if(e.key==='Enter') check(); });
    window.onload = next;
</script>
