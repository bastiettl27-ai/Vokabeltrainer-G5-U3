<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ettl Trainer - Master Edition Pro</title>
    <script src="audio_data.js"></script>
    <style>
        :root { 
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); 
            --glass: rgba(100, 116, 139, 0.9); 
            --glass-border: rgba(255, 255, 255, 0.4);
            --text: #ffffff;
            --tab-color: #3b82f6; 
        }
        body { font-family: 'SF Pro Display', 'Segoe UI', sans-serif; background: var(--bg-gradient); min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .progress-container { width: 100%; height: 8px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--tab-color); transition: width 0.5s ease; }

        .card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            padding: 2.2rem; border-radius: 35px; text-align: center; 
            width: 90%; max-width: 420px; 
            border: 2px solid var(--glass-border); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            position: relative; z-index: 10;
            display: block; 
            transition: all 0.3s ease;
        }
        
        .stats { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 15px; color: #ffffff; font-size: 0.9rem; }
        .streak-val { color: #f59e0b; }

        .mode-select { display: flex; gap: 8px; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 18px; }
        .mode-btn { flex: 1; font-size: 0.75rem; padding: 12px; border: none; cursor: pointer; border-radius: 14px; background: transparent; font-weight: 800; color: rgba(255,255,255,0.6); transition: 0.3s; }
        .mode-btn.active { background: var(--tab-color); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        #display-word { 
            font-size: 2.5rem; font-weight: 900; margin: 1.2rem 0; min-height: 4.5rem; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.3); color: #ffffff;
            display: flex; align-items: center; justify-content: center; 
            line-height: 1.1;
        }

        #feedback { font-size: 1.2rem; height: 1.8rem; margin-bottom: 15px; font-weight: 800; }
        
        input { 
            width: 100%; padding: 18px; border: none; border-radius: 20px; 
            font-size: 1.4rem; outline: none; margin-bottom: 20px; 
            text-align: center; background: #ffffff; color: #1e293b; 
            box-sizing: border-box; transition: 0.3s; font-weight: 700;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            text-transform: lowercase; 
        }

        .controls { display: flex; gap: 15px; }
        .btn-next { flex: 4; background: var(--tab-color); color: white; border: none; padding: 18px; border-radius: 20px; font-size: 1.3rem; font-weight: 800; cursor: pointer; }
        .btn-audio { flex: 1; background: rgba(255,255,255,0.25); border-radius: 20px; border: 1px solid var(--glass-border); cursor: pointer; font-size: 1.8rem; color: white; display: flex; align-items: center; justify-content: center; }
        
        .footer { margin-top: 35px; font-size: 0.9rem; color: #ffffff; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; opacity: 0.9; }
        canvas#fw { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        #finale { display: none; padding: 20px 0; }
        .medal { font-size: 6rem; display: block; filter: drop-shadow(0 0 15px gold); }

        .glow-correct { box-shadow: 0 0 50px #10b981 !important; transform: scale(1.02); }
        .glow-wrong { box-shadow: 0 0 50px #ef4444 !important; transform: translateX(5px); }
    </style>
</head>
<body>
<canvas id="fw"></canvas>
<div class="card" id="main-card">
    <div class="progress-container"><div id="progress-bar"></div></div>
    <div class="stats">
        <div>Score: <span id="count">0</span></div>
        <div>Streak: <span id="streak" class="streak-val">0</span> 🔥</div>
        <div>Noch: <span id="rem">0</span></div>
    </div>
    
    <div id="game-ui">
        <div class="mode-select">
            <button id="m-en" class="mode-btn active" onclick="setMode('EN_DE')">EN > DE</button>
            <button id="m-de" class="mode-btn" onclick="setMode('DE_EN')">DE > EN</button>
            <button id="m-au" class="mode-btn" onclick="setMode('AUDIO')">HÖREN</button>
        </div>
        <div id="display-word">Lade...</div>
        <div id="feedback"></div>
        <input type="text" id="in" placeholder="Antwort..." 
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div class="controls">
            <button class="btn-next" onclick="check()">PRÜFEN</button>
            <button class="btn-audio" onclick="play()">🔊</button>
        </div>
    </div>

    <div id="finale">
        <span class="medal">🥇</span>
        <h2>YOU ARE THE CHAMP!</h2>
        <p>Master Ettl Edition - Unit Complete!</p>
        <button class="btn-next" onclick="location.reload()" style="width:100%; margin-top:25px;">NEUSTART</button>
    </div>

    <div class="footer">MASTER ETTL EDITION</div>
</div>

<script>
    // ############################################################
    // NEUE VOKABEL-LISTE
    // ############################################################
    const raw = [
        {en:"borough", de:"Stadtteil; Bezirk"},
        {en:"to replace", de:"ersetzen"},
        {en:"terrorist attack", de:"Terrorattacke"},
        {en:"however", de:"jedoch; aber"},
        {en:"gap", de:"Lücke; Kluft"},
        {en:"known", de:"bekannt"},
        {en:"independence", de:"Unabhängigkeit"},
        {en:"statue", de:"Statue; Standbild"},
        {en:"hope", de:"Hoffnung"},
        {en:"electricity", de:"Strom; Elektrizität"},
        {en:"to be located", de:"gelegen sein; sich befinden"},
        {en:"grounds", de:"Gelände; Gebiet"},
        {en:"rush hour", de:"Hauptverkehrszeit"},
        {en:"roadwork", de:"Straßenbauarbeiten"},
        {en:"to complete", de:"fertigstellen; vervollständigen; abschließen"},
        {en:"to afford", de:"sich leisten"},
        {en:"to force", de:"zwingen"},
        {en:"to get tired of sth", de:"etw. satthaben"},
        {en:"landmark", de:"Wahrzeichen"},
        {en:"anyway", de:"eigentlich"},
        {en:"to feature", de:"vorkommen; zeigen"},
        {en:"to check out", de:"anschauen; ausprobieren"},
        {en:"collection", de:"Sammlung"},
        {en:"subway", de:"U-Bahn"},
        {en:"star sign", de:"Sternzeichen"},
        {en:"ceiling", de:"Zimmerdecke"},
        {en:"correct", de:"richtig; korrekt"},
        {en:"simply", de:"schlichtweg; einfach"},
        {en:"lights", de:"Ampeln"},
        {en:"to film", de:"filmen; drehen"},
        {en:"intersection", de:"Kreuzung"},
        {en:"airport", de:"Flughafen"},
        {en:"sidewalk", de:"Gehweg; Bürgersteig"},
        {en:"commuter", de:"Pendler; Pendlerin"},
        {en:"construction site", de:"Baustelle"},
        {en:"to renovate", de:"renovieren"},
        {en:"to raise", de:"anheben; erhöhen"},
        {en:"gateway", de:"Tor; Eingangstor"},
        {en:"descendant", de:"Abkömmling; Nachfahre"},
        {en:"journey", de:"Fahrt; Reise"},
        {en:"statistics", de:"Statistik"},
        {en:"to work off", de:"abarbeiten"},
        {en:"fresh", de:"frisch"},
        {en:"disease", de:"Krankheit"},
        {en:"harbor", de:"Hafen"},
        {en:"goddess", de:"Göttin"},
        {en:"unpleasant", de:"unangenehm; unerfreulich"},
        {en:"weak", de:"schwach"},
        {en:"over", de:"vorbei"},
        {en:"to make it", de:"es schaffen"},
        {en:"to escape", de:"entkommen; fliehen"},
        {en:"poverty", de:"Armut"},
        {en:"sample", de:"Muster; Probe"},
        {en:"location", de:"Drehort; Lage"},
        {en:"to book", de:"buchen; reservieren"},
        {en:"LOL", de:"laut lachend"},
        {en:"link", de:"Link; Verbindung"},
        {en:"review", de:"Kritik"},
        {en:"clean", de:"sauber"},
        {en:"inexpensive", de:"preisgünstig; billig"},
        {en:"staff", de:"Personal; Kollegium"},
        {en:"hostel", de:"Herberge"},
        {en:"quite", de:"ziemlich"},
        {en:"stop", de:"Haltestelle; Halt"},
        {en:"ASAP", de:"baldmöglichst"},
        {en:"reception", de:"Rezeption; Empfang"},
        {en:"Wi-Fi", de:"WLAN"},
        {en:"check in", de:"Einchecken"},
        {en:"check out", de:"Auschecken"},
        {en:"bathtub", de:"Badewanne"},
        {en:"iron", de:"Bügeleisen"},
        {en:"ferry", de:"Fähre"},
        {en:"single", de:"einzig; einzeln"},
        {en:"broken", de:"kaputt"},
        {en:"possibility", de:"Möglichkeit"},
        {en:"movie theater", de:"Kino"},
        {en:"Puerto Rican", de:"puertorikanisch"},
        {en:"various", de:"verschiedenartig"},
        {en:"choice", de:"Auswahl; Wahl"},
        {en:"screen", de:"Leinwand; Bildschirm"},
        {en:"to shoot", de:"drehen"},
        {en:"whether", de:"ob"},
        {en:"to jog", de:"joggen"},
        {en:"comic", de:"Comic"},
        {en:"superhero", de:"Superheld"},
        {en:"legendary", de:"legendär"},
        {en:"mural", de:"Wandgemälde"},
        {en:"guided tour", de:"Führung"},
        {en:"either way", de:"ganz egal"},
        {en:"cultural", de:"kulturell"},
        {en:"rap", de:"Rap"},
        {en:"DJing", de:"Musikauflegen"},
        {en:"breakdancing", de:"Breakdance"},
        {en:"bits and pieces", de:"Stückchen"},
        {en:"rhyme", de:"Reim"},
        {en:"gang", de:"Gang; Bande"},
        {en:"issue", de:"Angelegenheit; Problem"},
        {en:"robotic", de:"roboterhaft"},
        {en:"headspin", de:"Kopfdrehung"},
        {en:"global", de:"weltweit"},
        {en:"to seem", de:"erscheinen"},
        {en:"familiar", de:"vertraut"},
        {en:"skyscraper", de:"Wolkenkratzer"},
        {en:"skyline", de:"Skyline"},
        {en:"block", de:"Häuserblock"},
        {en:"architecture", de:"Architektur"},
        {en:"traffic jam", de:"Stau"},
        {en:"pollution", de:"Verschmutzung"},
        {en:"avenue", de:"Allee; Boulevard"},
        {en:"downtown", de:"im Stadtzentrum"},
        {en:"suburb", de:"Vorort"},
        {en:"to commute", de:"pendeln"},
        {en:"public transport", de:"öffentliche Verkehrsmittel"},
        {en:"department store", de:"Kaufhaus"}
    ];

    let pool = [...raw]; let total = raw.length; let cur = null; 
    let mode = 'EN_DE'; let score = 0; let streak = 0; let audioCtx = null;
    const tabColors = ["#3b82f6", "#f97316", "#db2777", "#10b981", "#8b5cf6", "#ef4444"];

    function setMode(m) { 
        mode = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        const activeId = m === 'EN_DE' ? 'm-en' : (m === 'DE_EN' ? 'm-de' : 'm-au');
        document.getElementById(activeId).classList.add('active'); 
        next(); 
    }

    function play() {
        if (!cur) return;
        const key = cur.en.toLowerCase().replace(/[?!.,']/g, "").trim();
        if (typeof MASTER_ETTL_AUDIO !== 'undefined' && MASTER_ETTL_AUDIO[key]) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            new Audio("data:audio/mp3;base64," + MASTER_ETTL_AUDIO[key]).play();
        }
    }

    function next() {
        if (pool.length === 0) {
            document.getElementById('game-ui').style.display = "none";
            document.getElementById('finale').style.display = "block";
            document.getElementById('progress-bar').style.width = "100%";
            setInterval(fire, 600);
            return;
        }
        let progress = ((total - pool.length) / total) * 100;
        document.getElementById('progress-bar').style.width = progress + "%";
        cur = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('in').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('rem').innerText = pool.length;
        if (mode === 'EN_DE') document.getElementById('display-word').innerText = cur.en;
        else if (mode === 'DE_EN') document.getElementById('display-word').innerText = cur.de;
        else { document.getElementById('display-word').innerText = "🔊 Listen..."; play(); }
        setTimeout(() => document.getElementById('in').focus(), 100);
    }

    function check() {
        let inputVal = document.getElementById('in').value.trim();
        if (!inputVal) return;
        let target = (mode === 'DE_EN' || mode === 'AUDIO') ? cur.en : cur.de;
        const feed = document.getElementById('feedback');
        const card = document.getElementById('main-card');

        function normalize(s) {
            return s.toLowerCase()
                    .replace(/[’´`]/g, "'") 
                    .replace(/ae/g, "ä").replace(/oe/g, "ö").replace(/ue/g, "ü").replace(/ss/g, "ß")
                    .replace(/^to\s+/i, "") 
                    .replace(/[?!.,]/g, "") 
                    .trim();
        }

        let userVal = normalize(inputVal);
        let targets = target.split(";").map(s => normalize(s));
        
        let isCorrect = targets.some(t => {
            if (userVal === t) return true;
            let alt = t.replace(/or$/, "our").replace(/our$/, "or").replace(/re$/, "er").replace(/er$/, "re").replace(/ize$/, "ise").replace(/ise$/, "ize");
            return userVal === alt;
        });

        if (isCorrect) {
            score++; streak++;
            pool = pool.filter(i => i.en !== cur.en);
            feed.innerText = "✓ Richtig!"; feed.style.color = "#10b981";
            card.classList.add('glow-correct');
            const colorIdx = Math.floor(score / 10) % tabColors.length;
            document.documentElement.style.setProperty('--tab-color', tabColors[colorIdx]);
            if (score % 10 === 0) fire();
            setTimeout(() => { card.classList.remove('glow-correct'); next(); }, 800);
        } else {
            streak = 0;
            feed.innerText = "✗ Lösung: " + target; feed.style.color = "#ef4444";
            card.classList.add('glow-wrong');
            setTimeout(() => { card.classList.remove('glow-wrong'); next(); }, 2500);
        }
        document.getElementById('count').innerText = score;
        document.getElementById('streak').innerText = streak;
    }

    function fire() {
        const c = document.getElementById('fw'); const x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let particles = [];
        let originX = (pool.length === 0) ? Math.random() * c.width : c.width/2;
        let originY = (pool.length === 0) ? Math.random() * c.height : c.height/2;
        for(let i=0; i<80; i++) {
            particles.push({x:originX, y:originY, dx:(Math.random()-0.5)*18, dy:(Math.random()-0.5)*18, col:`hsl(${Math.random()*360},80%,60%)`, a:1});
        }
        function draw() {
            x.clearRect(0,0,c.width,c.height);
            particles.forEach(p => { p.x+=p.dx; p.y+=p.dy; p.dy+=0.25; p.a-=0.015; x.globalAlpha=p.a; x.fillStyle=p.col; x.beginPath(); x.arc(p.x,p.y,4,0,7); x.fill(); });
            particles = particles.filter(p=>p.a>0);
            if(particles.length>0) requestAnimationFrame(draw);
        }
        draw();
    }

    document.getElementById('in').addEventListener('keypress', (e) => { if(e.key==='Enter') check(); });
    window.onload = next;
</script>
</body>
</html>
